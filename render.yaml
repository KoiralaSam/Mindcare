services:
  - type: web
    name: g7-backend
    env: go
    rootDir: backend
    buildCommand: go build ./internal/cmd -o app
    startCommand: ./app
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ML_SERVICE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        sync: false

  - type: web
    name: g7-ml-service
    env: python
    rootDir: ml
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn mental_health_ml.serve:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
